<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, serverTimestamp, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQH7D54SyerTRa8Y8BXFDFB5cAJkA8p2Q",
  authDomain: "calendariofamiliar-edeb3.firebaseapp.com",
  projectId: "calendariofamiliar-edeb3",
  storageBucket: "calendariofamiliar-edeb3.firebasestorage.app",
  messagingSenderId: "251743449792",
  appId: "1:251743449792:web:7dfa1ac95b35648edff325",
  databaseURL: "https://calendariofamiliar-edeb3-default-rtdb.firebaseio.com"
};
const fbApp = initializeApp(firebaseConfig);
const db    = getDatabase(fbApp);
const auth  = getAuth(fbApp);
const prov  = new GoogleAuthProvider();

// IMPORTANTE: Agregar scopes necesarios
prov.addScope('https://www.googleapis.com/auth/userinfo.email');
prov.addScope('https://www.googleapis.com/auth/userinfo.profile');
prov.setCustomParameters({
  prompt: 'select_account'  // Forzar selección de cuenta
});

const names  = { mama:'Mamá', papa:'Papá', hijo1:'Catalina', hijo2:'Juan Martin' };
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const colors = { mama:'#ec4899', papa:'#3b82f6', hijo1:'#f59e0b', hijo2:'#10b981' };
const WORK_START = 7*60, WORK_END = 22*60, BUFFER = 15;
const WORK_DAYS  = [1,2,3,4,5];

let activities   = [];
let currentUser  = null;
let notifTimer   = null;
let filterMember = 'all';
let calYear      = new Date().getFullYear();
let calMonth     = new Date().getMonth();
let selectedDate = null;

// Detectar si es móvil (donde popup suele fallar)
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

// ── Helpers ───────────────────────────────────────────────────
function setSS(s,m){ const e=document.getElementById('sync-status'); e.className='sync-'+s; e.textContent=m; }
function toast(m){ const e=document.getElementById('toast'); e.textContent=m; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2500); }
function hideLoad(){ const e=document.getElementById('loading'); e.classList.add('hide'); setTimeout(()=>e.style.display='none',400); }
function t2m(t){ if(!t)return null; const[h,m]=t.split(':').map(Number); return h*60+m; }
function m2t(m){ return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }

// ── Auth ──────────────────────────────────────────────────────
window.loginGoogle = async () => {
  try {
    setSS('load', '⏳ Conectando con Google...');
    
    if (isMobile) {
      // En móvil usar redirect en lugar de popup
      await signInWithRedirect(auth, prov);
    } else {
      // En desktop usar popup
      await signInWithPopup(auth, prov);
    }
  } catch(e) {
    console.error('Error login:', e);
    let msg = '❌ Error al iniciar sesión';
    
    // Mensajes específicos según el error
    if (e.code === 'auth/popup-blocked') {
      msg = '❌ El navegador bloqueó el popup. Intenta con redirect...';
      // Fallback a redirect
      try {
        await signInWithRedirect(auth, prov);
        return;
      } catch(e2) {
        msg = '❌ Error en redirect: ' + e2.message;
      }
    } else if (e.code === 'auth/cancelled-popup-request') {
      msg = '⚠️ Operación cancelada';
    } else if (e.code === 'auth/unauthorized-domain') {
      msg = '❌ Dominio no autorizado en Firebase';
    } else if (e.code === 'auth/invalid-credential') {
      msg = '❌ Credencial inválida. Verifica configuración OAuth en Google Cloud Console';
    } else if (e.message && e.message.includes('requested action is invalid')) {
      msg = '❌ Acción inválida. Intenta recargar la página o usar modo incógnito';
    }
    
    toast(msg);
    setSS('error', '❌ Error de login');
  }
};

// Manejar resultado de redirect (cuando vuelve de Google)
if (isMobile) {
  getRedirectResult(auth).then((result) => {
    if (result) {
      console.log('Login por redirect exitoso');
    }
  }).catch((error) => {
    console.error('Error en redirect:', error);
    toast('❌ Error al volver de Google: ' + error.message);
  });
}

window.logout = async()=>{
  closeUserMenu();
  await signOut(auth);
  activities=[]; document.getElementById('app').innerHTML='';
  document.getElementById('login-screen').classList.add('show');
  toast('👋 Sesión cerrada');
};

onAuthStateChanged(auth, async user=>{
  if(!user){ hideLoad(); document.getElementById('login-screen').classList.add('show'); return; }
  currentUser=user;
  document.getElementById('login-screen').classList.remove('show');
  document.getElementById('um-name').textContent  = user.displayName||'Usuario';
  document.getElementById('um-email').textContent = user.email||'';
  await set(ref(db,'usuarios/'+user.uid),{ uid:user.uid, nombre:user.displayName||'', email:user.email||'', fotoURL:user.photoURL||'', ultimaConexion:serverTimestamp() });
  onValue(ref(db,'calendario/eventos'), snap=>{
    activities=[];
    const d=snap.val();
    if(d) Object.entries(d).forEach(([k,v])=>activities.push({...v,_key:k}));
    hideLoad(); setSS('ok','✅ Sincronizado');
    render(); scheduleNotif();
  }, err=>{ setSS('error','❌ Sin conexión'); hideLoad(); });
  if('Notification' in window && Notification.permission==='default')
    document.getElementById('notif-banner').classList.add('show');
});

// ── Notificaciones ────────────────────────────────────────────
window.requestNotifPermission = async()=>{
  const p=await Notification.requestPermission();
  document.getElementById('notif-banner').classList.remove('show');
  if(p==='granted'){ toast('🔔 Activadas'); scheduleNotif(); } else toast('🔕 Desactivadas');
};
window.dismissNotifBanner = ()=>document.getElementById('notif-banner').classList.remove('show');
function scheduleNotif(){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  if(notifTimer) clearInterval(notifTimer);
  function check(){
    const now=new Date(), todayDow=now.getDay(), nowMin=now.getHours()*60+now.getMinutes();
    activities.forEach(a=>{
      if(parseInt(a.day)!==todayDow||!a.time) return;
      const diff=t2m(a.time)-nowMin;
      if(diff>=29&&diff<=31){
        const key=`n_${a._key}_${now.toDateString()}`;
        if(!sessionStorage.getItem(key)){ sessionStorage.setItem(key,'1'); new Notification('📅 Recordatorio',{body:`${names[a.member]||a.member}: "${a.title}" en 30 min`}); }
      }
    });
  }
  check(); notifTimer=setInterval(check,60000);
}

// ── Render ────────────────────────────────────────────────────
window.render = function(){
  const app=document.getElementById('app');
  const av = currentUser?.photoURL
    ? `<img src="${currentUser.photoURL}" class="user-avatar" onclick="toggleUserMenu()" referrerpolicy="no-referrer">`
    : `<div class="user-avatar-ph" onclick="toggleUserMenu()">👤</div>`;

  let html=`
    <div class="header">
      <div class="header-top">
        <div><h1>📅 Calendario Familiar</h1>
          <div class="header-date">${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
        </div>${av}
      </div>
    </div>
    <div class="member-filters">
      <button class="mf-btn${filterMember==='all'?' active':''}" style="${filterMember==='all'?'background:#4f46e5;color:white':''}" onclick="setFilter('all')">Todos</button>`;

  [['mama','👩'],['papa','👨'],['hijo1','🧒'],['hijo2','👶']].forEach(([k,ic])=>{
    const act=filterMember===k;
    html+=`<div class="mf-wrap">
      <button class="mf-btn${act?' active':''}" style="${act?'background:'+colors[k]+';color:white':''}" onclick="setFilter('${k}')">${ic} ${names[k]}</button>
      <button class="mf-free" onclick="showFreeTime('${k}')">🕐</button>
    </div>`;
  });
  html+=`</div>`;
  html+=renderCalendar();
  html+=`<button class="fab" onclick="add()">+</button>`;
  app.innerHTML=html;
};

// ── Calendario ────────────────────────────────────────────────
function renderCalendar(){
  const today=new Date();
  const first=new Date(calYear,calMonth,1);
  const last =new Date(calYear,calMonth+1,0);
  const startDow=(first.getDay()+6)%7; // lun=0
  const total=last.getDate();

  let html=`
    <div class="cal-nav">
      <button onclick="prevMonth()">‹</button>
      <span class="cal-month">${MONTHS[calMonth]} ${calYear}</span>
      <button onclick="nextMonth()">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        <div class="cal-wd">Lun</div><div class="cal-wd">Mar</div><div class="cal-wd">Mié</div>
        <div class="cal-wd">Jue</div><div class="cal-wd">Vie</div><div class="cal-wd">Sáb</div><div class="cal-wd">Dom</div>
      </div>
      <div class="cal-days">`;

  for(let i=0;i<startDow;i++) html+=`<div class="cal-day empty"></div>`;

  for(let day=1;day<=total;day++){
    const date=new Date(calYear,calMonth,day);
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dow=date.getDay();
    const isToday=date.toDateString()===today.toDateString();
    const isSel=selectedDate===ds;

    // Eventos del día: filtra por fecha exacta
    let evs=activities.filter(a=>{
      if(parseInt(a.day)!==dow) return false;
      // Si el evento tiene fecha guardada, que coincida exactamente con este día del calendario
      if(a.fecha) return a.fecha===ds;
      // Si no tiene fecha (eventos viejos sin fecha), mostrar en todos los días del mismo día de semana
      return true;
    });
    if(filterMember!=='all') evs=evs.filter(a=>a.member===filterMember);
    const count=evs.length;

    // Colores únicos de miembros con eventos
    const memberSet=[...new Set(evs.map(a=>a.member))];

    let badges='';
    if(count>0){
      if(memberSet.length===1){
        badges=`<div class="cal-badge" style="background:${colors[memberSet[0]]}">${count}</div>`;
      } else {
        const dots=memberSet.slice(0,3).map(m=>`<div style="width:6px;height:6px;border-radius:50%;background:${colors[m]}"></div>`).join('');
        badges=`<div style="display:flex;gap:2px;justify-content:center;">${dots}</div><div class="cal-badge" style="background:#4f46e5">${count}</div>`;
      }
    }

    html+=`<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay('${ds}')">
      <div class="cal-dn">${day}</div>
      ${badges}
    </div>`;
  }

  // Rellenar hasta completar la última fila
  const endDow=(last.getDay()+6)%7;
  for(let i=endDow+1;i<7;i++) html+=`<div class="cal-day empty"></div>`;

  html+=`</div></div>`;

  // Leyenda
  html+=`<div class="cal-legend">`;
  Object.entries(names).forEach(([k,n])=>{
    html+=`<div class="legend-item"><div class="legend-dot" style="background:${colors[k]}"></div>${n}</div>`;
  });
  html+=`</div>`;

  return html;
}

window.prevMonth=()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} render(); };
window.nextMonth=()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} render(); };

window.selectDay=function(ds){
  selectedDate=ds;
  render();
  openDayPanel(ds);
};

// ── Panel día ─────────────────────────────────────────────────
function openDayPanel(ds){
  const d=new Date(ds+'T12:00:00');
  const dow=d.getDay();
  const label=d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('day-panel-title').textContent=label.charAt(0).toUpperCase()+label.slice(1);

  let evs=activities.filter(a=>{
    if(parseInt(a.day)!==dow) return false;
    if(a.fecha) return a.fecha===ds;
    return true;
  });
  if(filterMember!=='all') evs=evs.filter(a=>a.member===filterMember);
  evs.sort((a,b)=>(a.time||'').localeCompare(b.time||''));

  let html='';
  if(evs.length===0){
    html=`<div class="day-empty"><div class="ei">📭</div><p style="font-weight:700">Sin eventos este día</p></div>`;
  } else {
    evs.forEach(a=>{
      const c=colors[a.member]||'#4f46e5';
      const ic=a.member==='mama'?'👩':a.member==='papa'?'👨':a.member==='hijo1'?'🧒':'👶';
      const canDel=currentUser&&a.creadoPor===currentUser.uid;
      const tr=a.time?(a.timeFin?`${a.time} – ${a.timeFin}`:a.time):'';
      html+=`<div class="day-ev" style="border-left-color:${c}">
        <div class="day-ev-time">${tr}</div>
        <div class="day-ev-title">${a.title}</div>
        <div class="day-ev-meta">${ic} ${names[a.member]||a.member}${a.location?' · 📍'+a.location:''}</div>
        ${a.esRepetido?`<div style="font-size:11px;color:var(--muted);margin-top:3px;font-weight:700;">🔁 Semana ${a.semana}/${a.totalSemanas}</div>`:''}
        ${a.traslado&&a.traslado!=='none'?`<div style="font-size:11px;color:#92400e;margin-top:3px;font-weight:700;">🚗 Lleva: ${a.traslado==='ambos'?'Mamá y Papá':names[a.traslado]}</div>`:''}
        ${canDel?`<button class="del-btn" onclick="del('${a._key}')">×</button>`:''}
      </div>`;
    });
  }
  html+=`<button class="day-add-btn" onclick="closeDayPanel();add()">+ Agregar evento este día</button>`;

  document.getElementById('day-panel-content').innerHTML=html;
  document.getElementById('day-panel').classList.add('open');
}

window.closeDayPanel=()=>{ document.getElementById('day-panel').classList.remove('open'); selectedDate=null; render(); };

// ── Filtro ────────────────────────────────────────────────────
window.setFilter=f=>{ filterMember=f; render(); };

// ── User menu ─────────────────────────────────────────────────
window.toggleUserMenu=()=>document.getElementById('user-menu').classList.toggle('open');
window.closeUserMenu =()=>document.getElementById('user-menu').classList.remove('open');
document.addEventListener('click',e=>{
  const m=document.getElementById('user-menu');
  if(m.classList.contains('open')&&!m.contains(e.target)&&!e.target.closest('.user-avatar,.user-avatar-ph')) closeUserMenu();
});

// ── Modal evento ──────────────────────────────────────────────
window.onMemberChange=()=>{
  const isKid=['hijo1','hijo2'].includes(document.getElementById('m').value);
  document.getElementById('traslado-field').style.display=isKid?'block':'none';
  if(!isKid) document.getElementById('traslado').value='none';
};

window.add=()=>{ document.getElementById('d').value=new Date().getDay()||1; document.getElementById('modal').classList.add('open'); };

window.closeModal=()=>{
  document.getElementById('modal').classList.remove('open');
  ['t','ti','tf','l'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('rep').value='none';
  document.getElementById('traslado').value='none';
  document.getElementById('traslado-field').style.display='none';
};

window.save=async()=>{
  const title=document.getElementById('t').value.trim();
  const ti=document.getElementById('ti').value;
  const tf=document.getElementById('tf').value;
  if(!title||!ti){ toast('⚠️ Ingresá título y hora de inicio'); return; }
  if(tf&&tf<=ti){ toast('⚠️ La hora de fin debe ser mayor al inicio'); return; }

  const member=document.getElementById('m').value;
  const day=parseInt(document.getElementById('d').value);
  const loc=document.getElementById('l').value.trim();
  const rep=document.getElementById('rep').value;
  const tras=document.getElementById('traslado').value;

  // Calcular fechas a generar
  // rep='none' => solo la fecha del próximo día seleccionado
  // rep='0'..'6' => todos los días de ese día de semana en el año calendario actual
  function getDatesForDay(targetDow, yearOnly){
    const dates=[];
    const yearStart=new Date(new Date().getFullYear(),0,1);
    const yearEnd  =new Date(new Date().getFullYear(),11,31);
    const d=new Date(yearStart);
    // Avanzar hasta el primer día de la semana buscado
    while(d.getDay()!==targetDow) d.setDate(d.getDate()+1);
    while(d<=yearEnd){
      dates.push(d.toISOString().split('T')[0]);
      d.setDate(d.getDate()+7);
    }
    return dates;
  }

  function getNextDate(targetDow){
    const t=new Date(); const diff=(targetDow-t.getDay()+7)%7;
    const d=new Date(t); d.setDate(t.getDate()+(diff===0?0:diff)); d.setHours(0,0,0,0);
    return d.toISOString().split('T')[0];
  }

  const isRepeat = rep !== 'none';
  const repDow   = isRepeat ? parseInt(rep) : day;
  const dates    = isRepeat ? getDatesForDay(repDow) : [getNextDate(day)];
  const eventDay = isRepeat ? repDow : day;

  try{
    setSS('load','⏳ Guardando…');
    const gid = isRepeat ? `g_${Date.now()}` : null;
    for(let i=0;i<dates.length;i++){
      const ev={
        member, title, day: eventDay,
        time:ti, timeFin:tf||null, location:loc,
        traslado:['hijo1','hijo2'].includes(member)?tras:'none',
        fecha:dates[i],
        creadoPor:currentUser.uid, creadoPorNombre:currentUser.displayName||'',
        creadoEn:serverTimestamp(),
        ...(gid&&{groupId:gid, esRepetido:true, semana:i+1, totalSemanas:dates.length})
      };
      await push(ref(db,'calendario/eventos'),ev);
    }
    await push(ref(db,'registros/historial'),{
      uid:currentUser.uid, nombre:currentUser.displayName||'',
      accion:'crear_evento',
      detalle: isRepeat
        ? `Creó "${title}" para ${names[member]} todos los ${DAYS[repDow]} del año (${dates.length} eventos)`
        : `Creó "${title}" para ${names[member]}`,
      fecha:serverTimestamp()
    });
    closeModal();
    toast(isRepeat ? `✅ ${dates.length} eventos creados` : '✅ Guardado');
  }catch(e){ setSS('error','❌ Error'); toast('❌ '+e.message); }
};

window.del=async key=>{
  if(!confirm('¿Eliminar?')) return;
  try{
    setSS('load','⏳ Eliminando…');
    await remove(ref(db,'calendario/eventos/'+key));
    await push(ref(db,'registros/historial'),{uid:currentUser.uid,nombre:currentUser.displayName||'',accion:'eliminar_evento',detalle:`Eliminó ${key}`,fecha:serverTimestamp()});
    if(selectedDate) openDayPanel(selectedDate);
    toast('🗑️ Eliminado');
  }catch(e){ setSS('error','❌ Error'); toast('❌ '+e.message); }
};

// ── Horarios libres ───────────────────────────────────────────
window.showFreeTime=function(member){
  const ic=member==='mama'?'👩':member==='papa'?'👨':member==='hijo1'?'🧒':'👶';
  // Calcular lunes y viernes de la semana actual para el subtítulo
  const tn=new Date();
  const mo=(tn.getDay()===0?-6:1-tn.getDay());
  const lun=new Date(tn); lun.setDate(tn.getDate()+mo);
  const vie=new Date(lun); vie.setDate(lun.getDate()+4);
  const fmt=d=>d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  document.getElementById('free-title').innerHTML=
    `<span style="color:${colors[member]}">${ic} ${names[member]}</span> — Horarios libres<div style="font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;">Semana del ${fmt(lun)} al ${fmt(vie)}</div>`;
  let totalMin=0, html='';

  // Calcular las fechas de lunes a viernes de la semana actual
  const todayRef = new Date();
  const todayDow = todayRef.getDay(); // 0=dom
  const mondayOffset = (todayDow === 0 ? -6 : 1 - todayDow);
  const weekDates = {};
  WORK_DAYS.forEach(d=>{
    const fd = new Date(todayRef);
    fd.setDate(todayRef.getDate() + mondayOffset + (d - 1));
    weekDates[d] = fd.toISOString().split('T')[0]; // YYYY-MM-DD
  });

  WORK_DAYS.forEach(dow=>{
    const thisDateStr = weekDates[dow];
    const busy=[];
    activities.forEach(a=>{
      if(parseInt(a.day)!==dow||!a.time) return;
      // Solo considerar eventos de esta semana específica
      if(a.fecha && a.fecha !== thisDateStr) return;
      const s=t2m(a.time);
      const e=a.timeFin?t2m(a.timeFin):s+60; // si hay fin lo usa, sino +60min
      const own=a.member===member;
      const kid=['hijo1','hijo2'].includes(a.member);
      const tras=kid&&(a.traslado===member||a.traslado==='ambos');
      if(own||tras){
        busy.push({
          start:Math.max(WORK_START,tras?s-BUFFER:s),
          end:Math.min(WORK_END,  tras?e+BUFFER:e),
          label:a.title, isKid:tras
        });
      }
    });
    busy.sort((a,b)=>a.start-b.start);
    const free=[]; let cur=WORK_START;
    busy.forEach(b=>{ if(b.start>cur) free.push({start:cur,end:b.start}); cur=Math.max(cur,b.end); });
    if(cur<WORK_END) free.push({start:cur,end:WORK_END});
    free.forEach(s=>totalMin+=s.end-s.start);

    const isToday=dow===new Date().getDay();
    html+=`<div class="free-day-block"><div class="free-day-name${isToday?' today-day':''}">${DAYS[dow]}${isToday?' 📍':''}</div>`;
    if(free.length===0){
      html+=`<div class="no-free">😓 Sin horarios libres</div>`;
    } else {
      free.forEach(s=>{
        const dur=s.end-s.start, h=Math.floor(dur/60), m=dur%60;
        html+=`<div class="free-slot">✅ ${m2t(s.start)} – ${m2t(s.end)} <span style="opacity:0.6;font-size:12px;margin-left:4px;">(${h>0?h+'h':''}${m>0?' '+m+'min':''})</span></div>`;
      });
    }
    busy.forEach(b=>{ html+=`<div class="busy-slot">🔴 ${m2t(b.start)} – ${m2t(b.end)} · ${b.label}${b.isKid?' 🚗':''}</div>`; });
    html+=`</div>`;
  });

  const th=Math.floor(totalMin/60), tm=totalMin%60;
  document.getElementById('free-content').innerHTML=
    `<div class="free-summary"><span>${th}h ${tm>0?tm+'min':''}</span>disponibles Lun–Vie (07–22hs)</div>`+html;
  document.getElementById('free-panel').classList.add('open');
};
window.closeFreePanel=()=>document.getElementById('free-panel').classList.remove('open');

// ── Gestión de eventos ────────────────────────────────────────
window.openManage = function(){
  const memberList = [
    ['mama','👩','Mamá'],['papa','👨','Papá'],
    ['hijo1','🧒','Catalina'],['hijo2','👶','Juan Martin']
  ];

  let html='<p style="font-size:13px;color:var(--muted);font-weight:600;margin-bottom:16px;">Eliminá todos los eventos de un miembro o de toda la familia.</p>';

  memberList.forEach(([key, icon, label])=>{
    const count = activities.filter(a=>a.member===key).length;
    const c = colors[key];
    html+=`<div class="manage-row">
      <div class="manage-row-left">
        <div class="manage-row-icon">${icon}</div>
        <div>
          <div class="manage-row-name" style="color:${c}">${label}</div>
          <div class="manage-row-count">${count} evento${count!==1?'s':''}</div>
        </div>
      </div>
      ${count>0
        ? `<button class="manage-del-btn" onclick="deleteByMember('${key}','${label}')">Eliminar todos</button>`
        : `<span style="font-size:12px;color:var(--muted);font-weight:700;">Sin eventos</span>`
      }
    </div>`;
  });

  const total = activities.length;
  if(total > 0){
    html+=`<hr class="manage-separator">
    <button class="manage-del-all" onclick="deleteAll()">🗑️ Eliminar TODOS los eventos (${total})</button>`;
  }

  document.getElementById('manage-content').innerHTML = html;
  document.getElementById('manage-panel').classList.add('open');
};

window.closeManage = ()=>document.getElementById('manage-panel').classList.remove('open');

window.deleteByMember = async function(member, label){
  const evs = activities.filter(a=>a.member===member);
  if(!confirm(`¿Eliminar los ${evs.length} eventos de ${label}? Esta acción no se puede deshacer.`)) return;
  try{
    setSS('load','⏳ Eliminando…');
    for(const a of evs) await remove(ref(db,'calendario/eventos/'+a._key));
    await push(ref(db,'registros/historial'),{
      uid:currentUser.uid, nombre:currentUser.displayName||'',
      accion:'eliminar_masivo', detalle:`Eliminó todos los eventos de ${label} (${evs.length})`,
      fecha:serverTimestamp()
    });
    toast(`🗑️ ${evs.length} eventos de ${label} eliminados`);
    closeManage();
    setTimeout(openManage, 400);
  }catch(e){ setSS('error','❌ Error'); toast('❌ '+e.message); }
};

window.deleteAll = async function(){
  const total = activities.length;
  if(!confirm(`¿Eliminar los ${total} eventos de toda la familia? Esta acción NO se puede deshacer.`)) return;
  try{
    setSS('load','⏳ Eliminando todo…');
    for(const a of activities) await remove(ref(db,'calendario/eventos/'+a._key));
    await push(ref(db,'registros/historial'),{
      uid:currentUser.uid, nombre:currentUser.displayName||'',
      accion:'eliminar_todo', detalle:`Eliminó todos los eventos (${total})`,
      fecha:serverTimestamp()
    });
    toast(`🗑️ ${total} eventos eliminados`);
    closeManage();
  }catch(e){ setSS('error','❌ Error'); toast('❌ '+e.message); }
};
</script>
